name: Build and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Run Domain tests
        run: dotnet test TestMauiPrism.Domain.Tests/TestMauiPrism.Domain.Tests.csproj --verbosity normal

      - name: Run Application tests
        run: dotnet test TestMauiPrism.Application.Tests/TestMauiPrism.Application.Tests.csproj --verbosity normal

      - name: Run Infrastructure tests
        run: dotnet test TestMauiPrism.Infrastructure.Tests/TestMauiPrism.Infrastructure.Tests.csproj --verbosity normal

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore TestMauiPrism/TestMauiPrism.csproj -p:RestoreTargetFrameworks=net10.0-android

      - name: Publish Android APK
        run: dotnet publish TestMauiPrism/TestMauiPrism.csproj -p:TargetFramework=net10.0-android -c Release --no-restore

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: TestMauiPrism/bin/Release/net10.0-android/publish/*.apk

  build-ios:
    name: Build iOS & macCatalyst
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Install MAUI iOS & macCatalyst workloads
        run: dotnet workload install maui-ios maui-maccatalyst

      - name: Restore dependencies
        run: >
          dotnet restore TestMauiPrism/TestMauiPrism.csproj
          -p:RestoreTargetFrameworks="net10.0-ios;net10.0-maccatalyst"
          -p:RestoreRuntimeIdentifiers="iossimulator-x64;maccatalyst-x64"

      - name: Build iOS (simulator)
        run: >
          dotnet build TestMauiPrism/TestMauiPrism.csproj
          -p:TargetFramework=net10.0-ios
          -c Release
          --no-restore
          /p:RuntimeIdentifier=iossimulator-x64
          /p:CodesignKey=""
          /p:CodesignEntitlements=""

      - name: Build macCatalyst
        run: >
          dotnet build TestMauiPrism/TestMauiPrism.csproj
          -p:TargetFramework=net10.0-maccatalyst
          -c Release
          --no-restore
          /p:RuntimeIdentifier=maccatalyst-x64
          /p:EnableCodeSigning=false

      - name: Upload macCatalyst artifact
        uses: actions/upload-artifact@v4
        with:
          name: maccatalyst-app
          path: TestMauiPrism/bin/Release/net10.0-maccatalyst/**/*.app

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Install MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Restore dependencies
        run: dotnet restore TestMauiPrism/TestMauiPrism.csproj -p:RestoreTargetFrameworks=net10.0-windows10.0.19041.0 -p:RuntimeIdentifier=win-x64

      - name: Publish Windows app
        run: >
          dotnet publish TestMauiPrism/TestMauiPrism.csproj
          -p:TargetFramework=net10.0-windows10.0.19041.0
          -c Release
          --no-restore
          /p:RuntimeIdentifier=win-x64
          /p:WindowsPackageType=None

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: TestMauiPrism/bin/Release/net10.0-windows10.0.19041.0/win10-x64/publish/
